query Timesheet($query: TimesheetQuery!, $options: TimesheetOptions!) {
  periods: timesheet(query: $query, options: $options) {
    id
    week
    month
    startDate
    endDate
    events {
      id
      title
      duration
      originalDuration
      adjustedMinutes
      startDateTime
      endDateTime
      date
      project {
        tag
        name
      }
      customer {
        key
        name
      }
    }
    isConfirmed
    isForecasted
    isForecast
    forecastedHours
  }
}
